<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salles Libres - ESIEE</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { background: white; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; font-size: 24px; }
        input { padding: 12px; margin: 10px 0; width: 90%; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { background-color: #1557b0; }
        #resultat { margin-top: 20px; text-align: left; }
        .salle { background: #e8f0fe; color: #1a73e8; padding: 10px; margin: 5px 0; border-radius: 8px; font-weight: bold; }
        .loader { display: none; margin-top: 15px; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 Salles Libres ESIEE</h1>
    <p>Trouve une salle dispo en 2 secondes !</p>
    
    <input type="datetime-local" id="datePicker">
    <button onclick="chercherSalles()">Rechercher</button>
    
    <div id="loading" class="loader">Recherche dans l'emploi du temps... ⏳</div>
    <div id="resultat"></div>
</div>

<script>
    // 1. On met la date et l'heure actuelle par défaut dans le sélecteur
    window.onload = function() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('datePicker').value = now.toISOString().slice(0, 16);
    };

    // 2. La fonction principale
    async function chercherSalles() {
        const resultatDiv = document.getElementById("resultat");
        const loader = document.getElementById("loading");
        const dateChoisie = new Date(document.getElementById("datePicker").value);
        
        resultatDiv.innerHTML = "";
        loader.style.display = "block";

        // Ton lien ADE ESIEE
        const lienADE = "https://edt-consult.univ-eiffel.fr/jsp/custom/modules/plannings/anonymous_cal.jsp?resources=5480&projectId=1&calType=ical&nbWeeks=4&displayConfigId=8";
        
        // ASTUCE PRO : On utilise un "Proxy" gratuit car les navigateurs bloquent la lecture directe sur un autre site (sécurité CORS)
        const proxyUrl = "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(lienADE);

        try {
            // On télécharge le calendrier
            const response = await fetch(proxyUrl);
            const texteIcal = await response.text();
            
            // On lance l'analyse (comme ton code Java)
            const evenements = analyserIcal(texteIcal);
            const sallesDispos = trouverSallesLibres(evenements, dateChoisie);

            // On affiche le résultat
            loader.style.display = "none";
            if(sallesDispos.length === 0) {
                resultatDiv.innerHTML = "<p>❌ Aucune salle libre trouvée à cette heure.</p>";
            } else {
                resultatDiv.innerHTML = `<p>✅ <b>${sallesDispos.length}</b> salles disponibles :</p>`;
                sallesDispos.forEach(salle => {
                    resultatDiv.innerHTML += `<div class="salle">${salle}</div>`;
                });
            }

        } catch (error) {
            loader.style.display = "none";
            resultatDiv.innerHTML = "<p>⚠️ Erreur lors de la récupération des données.</p>";
            console.error(error);
        }
    }

    // 3. Traduction de ton parseur Java en JavaScript
    function analyserIcal(texte) {
        const lignes = texte.split(/\r?\n/);
        const evenements = [];
        let coursActuel = null;

        lignes.forEach(ligne => {
            if (ligne.startsWith("BEGIN:VEVENT")) {
                coursActuel = { salles: [] };
            } else if (ligne.startsWith("DTSTART:") && coursActuel) {
                coursActuel.debut = parseDateIcal(ligne.substring(8).trim());
            } else if (ligne.startsWith("DTEND:") && coursActuel) {
                coursActuel.fin = parseDateIcal(ligne.substring(6).trim());
            } else if (ligne.startsWith("LOCATION:") && coursActuel) {
                let sallesStr = ligne.substring(9).trim().replace(/\\,/g, ",");
                if (sallesStr) {
                    coursActuel.salles = sallesStr.split(",").map(s => s.trim()).filter(s => s !== "");
                }
            } else if (ligne.startsWith("END:VEVENT") && coursActuel) {
                if (coursActuel.debut && coursActuel.fin && coursActuel.salles.length > 0) {
                    evenements.push(coursActuel);
                }
                coursActuel = null;
            }
        });
        return evenements;
    }

    function parseDateIcal(chaine) {
        // Transforme "20260328T080000Z" en vraie date
        const y = chaine.substring(0, 4);
        const m = chaine.substring(4, 6) - 1; // Les mois commencent à 0 en JS
        const d = chaine.substring(6, 8);
        const h = chaine.substring(9, 11);
        const min = chaine.substring(11, 13);
        const s = chaine.substring(13, 15);
        return new Date(Date.UTC(y, m, d, h, min, s));
    }

    function trouverSallesLibres(evenements, dateRecherche) {
        const toutesLesSalles = new Set();
        const sallesOccupees = new Set();

        evenements.forEach(cours => {
            cours.salles.forEach(salle => toutesLesSalles.add(salle));
            
            // Si la date demandée tombe pendant le cours
            if (dateRecherche >= cours.debut && dateRecherche < cours.fin) {
                cours.salles.forEach(salle => sallesOccupees.add(salle));
            }
        });

        // On soustrait les salles occupées de toutes les salles
        const sallesLibres = [...toutesLesSalles].filter(salle => !sallesOccupees.has(salle));
        return sallesLibres.sort(); // Tri alphabétique
    }
</script>

</body>
</html>
